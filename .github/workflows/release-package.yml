name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm changeset publish
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload tgz to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          pnpm -C packages/agentation-vue pack --pack-destination "$GITHUB_WORKSPACE"
          for pkg in $(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | "agentation-vue@v\(.version)"'); do
            TAG="${pkg#agentation-vue@}"
            gh release upload "$TAG" agentation-vue-*.tgz --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Chrome extension release asset
        if: steps.changesets.outputs.published == 'true'
        id: chrome-extension
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name=="agentation-vue") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "No agentation-vue release published; skipping Chrome extension asset."
            exit 0
          fi

          pnpm build:extension
          ARCHIVE="agentation-vue-chrome-extension-v${VERSION}.zip"
          cd packages/chrome-extension/dist
          zip -r "$GITHUB_WORKSPACE/$ARCHIVE" .
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload Chrome extension workflow artifact
        if: steps.chrome-extension.outputs.archive != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.chrome-extension.outputs.archive }}
          path: ${{ github.workspace }}/${{ steps.chrome-extension.outputs.archive }}
          retention-days: 7

      - name: Upload Chrome extension to GitHub Release
        if: steps.chrome-extension.outputs.archive != ''
        run: |
          gh release upload "${{ steps.chrome-extension.outputs.tag }}" "${{ github.workspace }}/${{ steps.chrome-extension.outputs.archive }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
