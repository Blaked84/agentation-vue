<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentation Extension Fixture</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; color: #1a1a1a; }
      .page { max-width: 960px; margin: 0 auto; padding: 48px 32px 120px; }
      .hero { margin-bottom: 24px; }
      .hero h1 { margin: 0 0 12px; font-size: 40px; }
      .hero p { margin: 0; max-width: 720px; line-height: 1.6; color: #4b5563; }
      .actions { display: flex; gap: 16px; margin-top: 24px; }
      .test-submit, .test-cancel { border: 0; border-radius: 999px; padding: 14px 22px; font-weight: 600; cursor: pointer; }
      .test-submit { background: #42b883; color: white; }
      .test-cancel { background: white; color: #111827; border: 1px solid #d1d5db; }
      .card-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; margin-top: 32px; }
      .card { background: white; border: 1px solid #e5e7eb; border-radius: 18px; padding: 20px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04); }
      .card h2 { margin: 0 0 8px; font-size: 18px; }
      .card p { margin: 0; color: #4b5563; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
  </html>
